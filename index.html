  if (isApp) document.documentElement.setAttribute('data-route-intent', 'app');
})();
</script>

<!-- ═══════════════════════════════════════════════════════════
     MEMORY HELPERS
═══════════════════════════════════════════════════════════ -->
<script>
const WORKER_URL = 'https://aura-token-worker.jeetupadhyay1204.workers.dev';

const AuraMemory = (() => {
  async function sessionStart(idToken, mode) {
    try {
      const resp = await fetch(`${WORKER_URL}/session-start`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ idToken, mode }) });
      if (!resp.ok) return { contextBlock:'', memorySnapshot:null };
      return await resp.json();
    } catch { return { contextBlock:'', memorySnapshot:null }; }
  }
  async function sessionEnd(idToken, payload) {
    try {
      const resp = await fetch(`${WORKER_URL}/session-end`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ idToken, ...payload }) });
      if (!resp.ok) return null;
      return await resp.json();
    } catch { return null; }
  }
  async function onboard(idToken, profile) {
    try {
      const resp = await fetch(`${WORKER_URL}/onboarding`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ idToken, ...profile }) });
      if (!resp.ok) return { success:false };
      return await resp.json();
    } catch (err) { return { success:false, error:err.message }; }
  }
  return { sessionStart, sessionEnd, onboard };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════
     MAIN APPLICATION ENTRY POINT
═══════════════════════════════════════════════════════════ -->
<script type="module">
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { auth, initAuthKeyListeners, handleHashChange } from '/src/modules/auth.js';
import { loadUserProfile } from '/src/modules/firestore.js';
import { routeAfterAuth, showOnboarding } from '/src/modules/ui.js';
import { initLanding } from '/src/modules/landing.js';

// Init landing page behaviour (router, flower logo, scroll reveal, waitlist)
initLanding();

// Auth key listeners (enter key on login/signup forms)
initAuthKeyListeners();

// Hash change handler
window.addEventListener('hashchange', handleHashChange);

// ── Auth state listener ───────────────────────────────────────────────────────
const DEV_EMAILS = ['jeetupadhyay1204@gmail.com', 'hetvi@germanmadeeasy.com'];

onAuthStateChanged(auth, async (user) => {
  const authScreen    = document.getElementById('auth-screen');
  const authChecking  = document.getElementById('auth-checking');
  const authFormWrap  = document.getElementById('auth-form-wrap');
  const appRoute      = document.documentElement.getAttribute('data-route-intent') === 'app'
                     || window.location.hash === '#aura';

  if (user) {
    // Hide auth screen
    if (authScreen)   authScreen.classList.remove('active');
    if (authChecking) authChecking.style.display = 'none';

    // Load profile from Firestore
    const profile = await loadUserProfile(user.uid);

    // Founder bypass — always treat as paid
    const isPaid = DEV_EMAILS.includes(user.email)
      || profile?.isPaidStudent === true
      || profile?.subscription === 'pro';

    // Store on window for session module access
    window.__auraUser         = user;
    window.__auraProfile      = profile;
    window.__auraIsPaid       = isPaid;

    if (appRoute) {
      if (!profile?.onboardingComplete) {
        showOnboarding();
      } else {
        routeAfterAuth();
      }
    }
  } else {
    // No user
    window.__auraUser    = null;
    window.__auraProfile = null;
    window.__auraIsPaid  = false;

    if (appRoute) {
      if (authScreen)  authScreen.classList.add('active');
      if (authChecking) authChecking.style.display = 'none';
      if (authFormWrap) authFormWrap.style.display = '';
    }
  }
});

// Import remaining modules to register their window.* bindings
import '/src/modules/session.js';
import '/src/modules/mocktest.js';
</script>
