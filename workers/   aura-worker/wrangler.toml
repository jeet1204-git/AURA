name = "aura-worker"
main = "worker.js"
compatibility_date = "2025-01-01"

[vars]
# These are non-secret defaults. Real values are set as secrets in Cloudflare dashboard.
# Do NOT put actual secret values here — this file is committed to git.

# Set these via: Cloudflare Dashboard → aura-worker → Settings → Variables & Secrets
# GEMINI_API_KEY       → secret
# SUPABASE_SERVICE_KEY → secret
# ALLOWED_ORIGINS      → plain var, e.g. "https://auraspeak.in,https://www.auraspeak.in"
