<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{ 
--bg:#050508;--surface:#13131e;--border:rgba(255,255,255,0.07);
--border2:rgba(255,255,255,0.13);--text:#e8e8f2;--muted:rgba(232,232,242,0.45);
--purple:#9d7fff;--blue:#5ba3ff;
--grad:linear-gradient(135deg,#9d7fff,#5ba3ff);
--grad2:linear-gradient(135deg,#7c5cfc,#4b8ef0);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
opacity:.4;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb-1{width:400px;height:400px;background:rgba(124,92,252,.12);top:-100px;right:-100px;}
.orb-2{width:300px;height:300px;background:rgba(91,163,255,.08);bottom:-80px;left:-80px;}
.card{
position:relative;z-index:1;
width:100%;max-width:400px;margin:20px;
background:var(--surface);
border:0.5px solid var(--border2);
border-radius:20px;
padding:40px 36px;
box-shadow:0 24px 80px rgba(0,0,0,.4);
}
.logo{
font-size:22px;font-weight:700;letter-spacing:-.3px;
background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
margin-bottom:28px;text-align:center;
}
h1{font-size:20px;font-weight:600;color:var(--text);text-align:center;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.5;}
.google-btn{
width:100%;padding:13px 20px;border-radius:12px;
background:#fff;border:none;
display:flex;align-items:center;justify-content:center;gap:10px;
font-size:14px;font-weight:500;color:#1a1a1a;
cursor:pointer;transition:opacity .15s,transform .15s;
margin-bottom:16px;
}
.google-btn:hover{opacity:.92;transform:translateY(-1px);}
.google-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.google-btn svg{width:18px;height:18px;flex-shrink:0;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:0.5px;background:var(--border);}
.divider-text{font-size:11px;color:var(--muted);}
.email-field{
width:100%;padding:11px 14px;border-radius:10px;
background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);
color:var(--text);font-size:13px;font-family:'Inter',sans-serif;
outline:none;margin-bottom:10px;
}
.email-field:focus{border-color:rgba(157,127,255,.5);}
.email-field::placeholder{color:var(--muted);}
.pass-field{
width:100%;padding:11px 14px;border-radius:10px;
background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);
color:var(--text);font-size:13px;font-family:'Inter',sans-serif;
outline:none;margin-bottom:16px;
}
.pass-field:focus{border-color:rgba(157,127,255,.5);}
.pass-field::placeholder{color:var(--muted);}
.submit-btn{
width:100%;padding:13px;border-radius:12px;
background:var(--grad2);border:none;
font-size:14px;font-weight:500;color:#fff;
cursor:pointer;transition:opacity .15s,transform .15s;
}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.error-msg{
margin-top:12px;padding:10px 14px;border-radius:9px;
background:rgba(248,113,113,.08);border:0.5px solid rgba(248,113,113,.3);
font-size:12px;color:#f87171;display:none;
}
.footer-note{
margin-top:24px;text-align:center;
font-size:11.5px;color:var(--muted);
}
.footer-note a{color:var(--purple);text-decoration:none;}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="card">
  <div class="logo">AURA</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to continue your language learning journey</p>
  <button class="google-btn" id="googleBtn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or</div>
    <div class="divider-line"></div>
  </div>
  <input class="email-field" id="emailInput" type="email" placeholder="Email address" autocomplete="email"/>
  <input class="pass-field" id="passInput" type="password" placeholder="Password" autocomplete="current-password"/>
  <button class="submit-btn" id="emailBtn">Sign in</button>
  <div class="error-msg" id="errorMsg"></div>
  <p class="footer-note">
    Don't have an account? <a href="#">Contact us</a> for early access.
  </p>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from '/src/config/constants.js';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const googleBtn  = document.getElementById('googleBtn');
const emailBtn   = document.getElementById('emailBtn');
const emailInput = document.getElementById('emailInput');
const passInput  = document.getElementById('passInput');
const errorMsg   = document.getElementById('errorMsg');

const GOOGLE_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;flex-shrink:0"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google`;

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
}
function clearError() {
  errorMsg.style.display = 'none';
}

const AUTH_PAGE_URL = `${window.location.origin}/src/app/screens/auth.html`;
let hasRedirectedAfterSignIn = false;

// ── After a successful sign-in, check Supabase for onboarding status ──────────
async function afterSignIn(userId) {
  if (hasRedirectedAfterSignIn) return;
  hasRedirectedAfterSignIn = true;

  try {
    const { data } = await supabase
      .from('users')
      .select('extra_data')
      .eq('id', userId)
      .single();

    const onboardingComplete = data?.extra_data?.onboardingComplete;
    window.location.href = onboardingComplete
      ? '/#aura'
      : '/src/app/screens/onboarding.html';
  } catch (e) {
    // If the row doesn't exist yet, go to onboarding
    window.location.href = '/src/app/screens/onboarding.html';
  }
}

// ── On page load: handle OAuth redirect callback ──────────────────────────────
// Important: redirectTo must be a clean auth URL (without stale hash tokens),
// otherwise Supabase can repeatedly parse an expired token and loop on auth.
supabase.auth.onAuthStateChange(async (event, session) => {
  if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session?.user) {
    await afterSignIn(session.user.id);
  }
});

// Fallback bootstrap for cases where onAuthStateChange event is missed on load.
(async function bootstrapSession() {
  const { data } = await supabase.auth.getSession();
  if (data?.session?.user) {
    await afterSignIn(data.session.user.id);
  }
})();

// ── Google OAuth ──────────────────────────────────────────────────────────────
googleBtn.addEventListener('click', async () => {
  clearError();
  googleBtn.disabled = true;
  googleBtn.textContent = 'Redirecting to Google…';

  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      // Always use a clean callback URL. Never use window.location.href because
      // it may contain stale OAuth hash params after a failed attempt.
      redirectTo: AUTH_PAGE_URL,
    },
  });

  if (error) {
    showError(error.message || 'Google sign in failed.');
    googleBtn.disabled = false;
    googleBtn.innerHTML = GOOGLE_SVG;
  }
  // On success the browser is redirected away — no further action needed.
});

// ── Email / Password ──────────────────────────────────────────────────────────
emailBtn.addEventListener('click', async () => {
  clearError();
  const email = emailInput.value.trim();
  const pass  = passInput.value;

  if (!email || !pass) { showError('Please enter your email and password.'); return; }

  emailBtn.disabled = true;
  emailBtn.textContent = 'Signing in…';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if (error) {
    const msg = error.message.toLowerCase().includes('invalid')
      ? 'Wrong email or password.'
      : error.message || 'Sign in failed.';
    showError(msg);
    emailBtn.disabled = false;
    emailBtn.textContent = 'Sign in';
    return;
  }

  if (data?.user) await afterSignIn(data.user.id);
});

passInput.addEventListener('keydown', e => { if (e.key === 'Enter') emailBtn.click(); });
</script>
</body>
</html>
